<!DOCTYPE html>
<html lang="en" data-theme="aurora">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>TradeBook — Super Trader Terminal</title>

<meta name="theme-color" content="#050510">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=JetBrains+Mono:wght@400;500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

/* THEMES */
:root[data-theme="aurora"] {
  --bg: #09090b; --bg-grad: #11111a; --s1: rgba(24, 24, 27, 0.6); --s2: rgba(39, 39, 42, 0.6); 
  --b1: rgba(255, 255, 255, 0.08); --b2: rgba(255, 255, 255, 0.15); --t1: #fafafa; --t2: #a1a1aa; --t3: #71717a;
  --acc: #3b82f6; --acc-glow: rgba(59,130,246,0.3); --grn: #10b981; --grn-glow: rgba(16,185,129,0.3); --grn-d: rgba(16,185,129,0.15);
  --red: #ef4444; --red-glow: rgba(239,68,68,0.3); --red-d: rgba(239,68,68,0.15); --yel: #f59e0b; --yel-d: rgba(245,158,11,0.15); --purp: #a855f7;
  --r: 20px; --r-sm: 12px; --glass-blur: blur(20px); --shadow-base: 0 10px 30px -10px rgba(0,0,0,0.5); --overlay-bg: rgba(0,0,0,0.8);
}
:root[data-theme="hologram"] {
  --bg: #050510; --bg-grad: #1a1a3a; --s1: rgba(20, 20, 45, 0.4); --s2: rgba(30, 30, 70, 0.6); 
  --b1: rgba(168, 85, 247, 0.2); --b2: rgba(0, 240, 255, 0.3); --t1: #ffffff; --t2: #a5b4fc; --t3: #6366f1;
  --acc: #00f0ff; --acc-glow: rgba(0, 240, 255, 0.5); --grn: #10b981; --grn-glow: rgba(16, 185, 129, 0.5); --grn-d: rgba(16,185,129,0.2);
  --red: #f43f5e; --red-glow: rgba(244, 63, 94, 0.5); --red-d: rgba(244, 63, 94, 0.2); --yel: #facc15; --yel-d: rgba(250,204,21,0.2); --purp: #a855f7;
  --r: 24px; --r-sm: 16px; --glass-blur: blur(30px); --shadow-base: 0 10px 40px -10px rgba(168, 85, 247, 0.2); --overlay-bg: rgba(5,5,15,0.8);
}
:root[data-theme="light"] {
  --bg: #F3F4F6; --bg-grad: #FFFFFF; --s1: rgba(255, 255, 255, 0.7); --s2: rgba(255, 255, 255, 0.9); 
  --b1: rgba(0, 0, 0, 0.08); --b2: rgba(0, 0, 0, 0.15); --t1: #111827; --t2: #4B5563; --t3: #9CA3AF;
  --acc: #2563EB; --acc-glow: rgba(37, 99, 235, 0.2); --grn: #059669; --grn-glow: rgba(5, 150, 105, 0.3); --grn-d: rgba(5,150,105,0.1);
  --red: #DC2626; --red-glow: rgba(220, 38, 38, 0.3); --red-d: rgba(220,38,38,0.1); --yel: #D97706; --yel-d: rgba(217,119,6,0.1); --purp: #7C3AED;
  --r: 20px; --r-sm: 12px; --glass-blur: blur(20px); --shadow-base: 0 10px 30px -10px rgba(0,0,0,0.1); --overlay-bg: rgba(255,255,255,0.8);
}

.ghost-mode .money { filter: blur(8px); opacity: 0.6; pointer-events: none; user-select: none; }
.money { transition: filter 0.3s ease, opacity 0.3s ease; display: inline-block; }

html, body { background-color: var(--bg); color: var(--t1); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; transition: background-color 0.5s ease, color 0.5s ease; background-image: radial-gradient(circle at 50% 0%, var(--bg-grad) 0%, var(--bg) 60%); }
.mono { font-family: 'JetBrains Mono', monospace; }

input, select, button { font-family: inherit; outline: none; }
::-webkit-scrollbar { width: 4px; height: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 10px; }

/* Layout */
.layout { display: flex; min-height: 100vh; position: relative; z-index: 10; max-width: 100vw; overflow-x: hidden; }
.sidebar { width: 260px; flex-shrink: 0; background: var(--s1); border-right: 1px solid var(--b1); backdrop-filter: var(--glass-blur); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 20; transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
.main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; max-width: 100vw; overflow-x: hidden; }

.sb-logo { padding: 32px 24px 24px; border-bottom: 1px solid var(--b1); }
#user-name { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; padding: 4px 6px; margin-left: -6px; border-radius: 8px; cursor: pointer; color: var(--t1); transition: all 0.3s; }
.sb-logo-sub { font-size: 11px; color: var(--acc); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; }

.sb-nav { padding: 20px 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.sb-nav a { display: flex; align-items: center; gap: 14px; padding: 12px 16px; font-size: 14px; font-weight: 600; color: var(--t2); border-radius: 16px; transition: all 0.3s ease; cursor: pointer; }
.sb-nav a:hover { color: var(--t1); background: rgba(128,128,128,0.1); transform: translateX(6px); }
.sb-nav a.active { color: var(--acc); background: rgba(128,128,128,0.1); border: 1px solid var(--b2); box-shadow: inset 0 0 20px rgba(128,128,128,0.05); }

.topbar { margin: 24px 32px 0; padding: 16px 24px; border-radius: var(--r); border: 1px solid var(--b1); background: var(--s1); backdrop-filter: var(--glass-blur); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 24px; z-index: 15; box-shadow: var(--shadow-base); transition: all 0.4s; }

.btn { padding: 12px 24px; border-radius: var(--r-sm); font-size: 13px; font-weight: 700; border: 1px solid transparent; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease; cursor: pointer; color:#fff; position: relative; overflow: hidden; }
.btn:active { transform: scale(0.94); } 
[data-theme="aurora"] .btn-primary { background: linear-gradient(135deg, #3b82f6, #8b5cf6); box-shadow: 0 4px 15px rgba(59,130,246,0.3); }
[data-theme="aurora"] .btn-success { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
[data-theme="aurora"] .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
[data-theme="hologram"] .btn-primary { background: linear-gradient(270deg, var(--acc), var(--purp), var(--acc)); background-size: 200% 200%; animation: liquidShift 3s ease infinite; box-shadow: 0 8px 25px rgba(168,85,247,0.4); }
[data-theme="hologram"] .btn-success { background: linear-gradient(270deg, var(--grn), #059669, var(--grn)); background-size: 200% 200%; animation: liquidShift 3s ease infinite; box-shadow: 0 8px 25px var(--grn-glow); }
[data-theme="hologram"] .btn-danger { background: linear-gradient(270deg, var(--red), #e11d48, var(--red)); background-size: 200% 200%; animation: liquidShift 3s ease infinite; box-shadow: 0 8px 25px var(--red-glow); }
[data-theme="light"] .btn-primary { background: linear-gradient(135deg, #2563EB, #7C3AED); }
[data-theme="light"] .btn-success { background: linear-gradient(135deg, #059669, #10B981); }
[data-theme="light"] .btn-danger { background: linear-gradient(135deg, #DC2626, #EF4444); }
@keyframes liquidShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
.btn-ghost { background: var(--s1); color: var(--t1); border: 1px solid var(--b1); }
.btn-ghost:hover { background: var(--s2); border-color: var(--t2); }
.btn-sm { padding: 10px 16px; font-size: 12px; }
.btn-ico { padding: 10px; border-radius: 50%; width: 40px; height: 40px; }

.page-body { padding: 40px 32px; max-width: 1400px; margin: 0 auto; width: 100%; animation: fadeIn 0.5s ease forwards; overflow-x: hidden; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px; }

.stat-card { background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r); padding: 28px; position: relative; box-shadow: var(--shadow-base); backdrop-filter: var(--glass-blur); transition: all 0.4s ease; }
.stat-card:hover { transform: translateY(-5px); border-color: var(--b2); }

.stat-lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--t2); }
.stat-val { font-size: 34px; font-weight: 800; margin-top: 12px; letter-spacing: -1px; }
.stat-sub { font-size: 13px; color: var(--t3); margin-top: 8px; font-weight: 500; }
.val-up { color: var(--grn); text-shadow: 0 0 15px var(--grn-glow); }
.val-dn { color: var(--red); text-shadow: 0 0 15px var(--red-glow); }
.val-acc { color: var(--acc); text-shadow: 0 0 15px var(--acc-glow); }

.tbl-wrap { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--b1); background: var(--s1); backdrop-filter: var(--glass-blur); box-shadow: var(--shadow-base); -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; min-width: 600px; }
thead { background: rgba(128,128,128,0.1); }
.sticky-th { position: sticky; top: 0; z-index: 5; background: var(--s2); backdrop-filter: blur(10px); }
th { padding: 20px 24px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); border-bottom: 1px solid var(--b1); }
td { padding: 20px 24px; border-bottom: 1px solid var(--b1); vertical-align: middle; transition: background 0.2s; white-space: nowrap; }
tbody tr:hover { background: rgba(128,128,128,0.05); }
tbody tr:last-child td { border-bottom: none; }

.badge { display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; box-shadow: inset 0 0 10px rgba(255,255,255,0.05); }
.badge-buy { background: var(--grn-d); color: var(--grn); border: 1px solid rgba(16,185,129,0.4); }
.badge-sell { background: var(--red-d); color: var(--red); border: 1px solid rgba(244,63,94,0.4); }

/* MARKET MAP UPGRADES */
.market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
.market-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; position: relative; overflow: hidden; }
.market-card:hover { transform: scale(1.05); z-index: 10; border-color: var(--t1); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
.mc-sym { font-family: var(--mono); font-size: 13px; font-weight: 800; color: var(--t1); margin-bottom: 6px; }
.mc-price { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--t1); margin-bottom: 4px; }
.mc-pct { font-family: var(--mono); font-size: 12px; font-weight: 800; }

/* VISUAL P&L BARS */
.pnl-bar-wrap { width: 100%; display: flex; align-items: center; gap: 10px; }
.pnl-bar-bg { flex: 1; height: 8px; background: rgba(128,128,128,0.1); border-radius: 4px; overflow: hidden; position: relative; }
.pnl-bar-fill { height: 100%; border-radius: 4px; }

/* Modals */
.overlay { position: fixed; inset: 0; background: var(--overlay-bg); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(15px); animation: fadeIn 0.3s ease; }
.modal { background: var(--bg); border: 1px solid var(--b1); border-radius: 24px; padding: 32px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 30px 80px rgba(0,0,0,0.8); }
.modal-close { position: absolute; top: 20px; right: 20px; background: rgba(128,128,128,0.1); border: 1px solid var(--b1); color: var(--t2); width: 36px; height: 36px; border-radius: 50%; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor:pointer;}
.modal-close:hover { background: var(--red); color: #fff; border-color: var(--red); }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 11px; font-weight: 700; color: var(--t2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em; }
.form-input { width: 100%; background: rgba(128,128,128,0.1); border: 1px solid var(--b1); border-radius: 12px; padding: 14px 16px; color: var(--t1); font-size: 14px; }
.form-input:focus { border-color: var(--acc); box-shadow: 0 0 0 3px var(--acc-glow); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.stock-search-wrap { position: relative; }
.stock-dd { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: var(--bg); border: 1px solid var(--b1); border-radius: 12px; z-index: 200; max-height: 250px; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
.stock-item { padding: 14px 20px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(128,128,128,0.1); }
.stock-item:hover { background: rgba(128,128,128,0.1); }
.stock-item .sym { font-family: var(--mono); font-size: 14px; font-weight: 800; color: var(--acc); }

.chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 40px; }
.chart-card { background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r); padding: 32px; box-shadow: var(--shadow-base); }
.chart-title { font-size: 15px; font-weight: 700; color: var(--t1); margin-bottom: 24px; letter-spacing: 0.05em; text-transform: uppercase;}

@keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.4s ease forwards; }

@media(max-width: 768px) {
  html, body, .layout, .main { max-width: 100vw; overflow-x: hidden; }
  .sidebar { transform: translateX(-100%); width: 280px; } 
  .sidebar.open { transform: none; box-shadow: 30px 0 100px rgba(0,0,0,0.9); } 
  .topbar { margin: 8px 12px 0; padding: 12px 16px; border-radius: 16px; }
  .mob-menu-btn { display: block; background: rgba(128,128,128,0.1); border: 1px solid var(--b1); color: var(--t1); font-size: 14px; font-weight:700; padding: 8px 12px; border-radius: 12px; }
  .page-body { padding: 20px 12px; width: 100%; max-width: 100%; } 
  
  .stats-grid { display: grid !important; grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 8px; margin-bottom: 24px; } 
  .stat-card { padding: 16px 12px; border-radius: 16px; transform: none !important; min-width: 0; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
  .stat-lbl { font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-val { font-size: 18px; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-sub { font-size: 10px; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .chart-grid, .form-row { grid-template-columns: 1fr; gap: 16px; } 
  .market-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
}

.toast-wrap { position: fixed; bottom: 32px; right: 32px; z-index: 500; display: flex; flex-direction: column; gap: 12px; }
.toast { padding: 16px 24px; border-radius: 16px; font-size: 14px; font-weight: 600; animation: fadeIn 0.4s; display: flex; align-items: center; gap: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); background: var(--bg); border: 1px solid var(--b2); color: var(--t1); }
</style>
</head>
<body>

<script>
  const savedTheme = localStorage.getItem('tb_pro_theme') || 'aurora';
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>

<div class="layout">
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div style="display:flex;align-items:flex-start;gap:12px">
      <span style="font-size:34px; line-height:1; color:var(--acc)">✦</span>
      <div>
        <div id="user-name" contenteditable="true" spellcheck="false" title="Click to edit">Bhargav Trade</div>
        <div class="sb-logo-sub">Pro Terminal</div>
      </div>
    </div>
  </div>
  <nav class="sb-nav" id="nav">
    <a class="active" data-page="dashboard"><span class="ico">◒</span>Dashboard</a>
    <a data-page="portfolio"><span class="ico">◉</span>Holdings</a>
    <a data-page="market"><span class="ico">▤</span>Market Map</a>
    <a data-page="impact"><span class="ico">🏛️</span>Capital Impact</a>
    <a data-page="pnl"><span class="ico">💰</span>P&L Book</a>
    <a data-page="analytics"><span class="ico">◎</span>Analytics</a>
    <a data-page="trades"><span class="ico">◈</span>Ledger</a>
    <a data-page="settings"><span class="ico">⚙</span>System</a>
  </nav>
  <div class="sb-footer">
    <div class="signature">Crafted for Bhargav</div>
    <div id="sb-stats" style="font-size: 12px; color: var(--t3); font-weight:600; margin-top:8px;">0 Positions</div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="mob-menu-btn" onclick="document.getElementById('sidebar').classList.add('open'); event.stopPropagation();">☰ Menu</button>
    <div style="display:flex;gap:10px; margin-left:auto;">
      <button class="btn btn-ghost btn-ico" id="ghost-toggle" onclick="toggleGhostMode()" title="Stealth Mode">👁️</button>
      <button class="btn btn-ghost btn-sm" id="theme-toggle" onclick="toggleTheme()" style="border-radius:12px;">Theme</button>
      <button class="btn btn-success btn-sm" onclick="openBuy()">+ Buy</button>
      <button class="btn btn-danger btn-sm" onclick="openSell()">- Sell</button>
    </div>
  </div>

  <div id="page-dashboard" class="page-body fade-in"></div>
  <div id="page-portfolio" class="page-body fade-in" style="display:none"></div>
  <div id="page-market" class="page-body fade-in" style="display:none"></div>
  <div id="page-impact" class="page-body fade-in" style="display:none"></div>
  <div id="page-pnl" class="page-body fade-in" style="display:none"></div>
  <div id="page-analytics" class="page-body fade-in" style="display:none"></div>
  <div id="page-trades" class="page-body fade-in" style="display:none"></div>
  <div id="page-settings" class="page-body fade-in" style="display:none"></div>
</div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<div class="overlay" id="buy-modal" style="display:none" onclick="if(event.target===this)closeBuy()">
<div class="modal">
  <button class="modal-close" onclick="closeBuy()">✕</button>
  <div class="modal-title">Trade Entry</div>
  <div class="form-group" style="margin-top:24px;">
    <div class="stock-search-wrap">
      <input type="text" class="form-input" id="buy-stock-input" placeholder="Ticker (e.g. RELIANCE)" autocomplete="off"/>
      <div class="stock-dd" id="buy-stock-dd" style="display:none"></div>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Date</label><input type="date" class="form-input mono" id="buy-date"/></div>
    <div class="form-group"><label>Rating</label><div class="star-rating"><input type="radio" id="star5" name="rating" value="5" /><label for="star5">★</label><input type="radio" id="star4" name="rating" value="4" /><label for="star4">★</label><input type="radio" id="star3" name="rating" value="3" checked /><label for="star3">★</label><input type="radio" id="star2" name="rating" value="2" /><label for="star2">★</label><input type="radio" id="star1" name="rating" value="1" /><label for="star1">★</label></div></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Price (₹)</label><input type="number" class="form-input mono" id="buy-price" placeholder="0.00" step="0.01"/></div>
    <div class="form-group"><label>Quantity</label><input type="number" class="form-input mono" id="buy-qty" placeholder="0"/></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Strategy</label><select class="form-input" id="buy-tag"><option value="Swing">Swing Trade</option><option value="Intraday">Intraday</option><option value="Breakout">Breakout</option><option value="Investment">Long-term</option></select></div>
    <div class="form-group"><label>Notes</label><input type="text" class="form-input" id="buy-notes"/></div>
  </div>
  <div class="modal-footer"><button class="btn btn-ghost" onclick="closeBuy()">Cancel</button><button class="btn btn-primary" onclick="submitBuy()">Execute</button></div>
</div>
</div>

<div class="overlay" id="sell-modal" style="display:none" onclick="if(event.target===this)closeSell()">
<div class="modal">
  <button class="modal-close" onclick="closeSell()">✕</button>
  <div class="modal-title">Close Position</div>
  <div class="form-group" style="margin-top:24px;"><label>Select Asset</label><select class="form-input" id="sell-stock-select"></select></div>
  <div class="form-row">
    <div class="form-group"><label>Date</label><input type="date" class="form-input mono" id="sell-date"/></div>
    <div class="form-group"><label>Price (₹)</label><input type="number" class="form-input mono" id="sell-price" placeholder="0.00" step="0.01"/></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Quantity</label><input type="number" class="form-input mono" id="sell-qty" placeholder="0"/></div>
    <div class="form-group"><label>Notes</label><input type="text" class="form-input" id="sell-notes"/></div>
  </div>

<script>
const Store = {
  rawTxns: [], holdings: {}, closedTrades: [], baseCapital: 100000,
  load() { try { const d = JSON.parse(localStorage.getItem('tb_v4')); if(d) { this.rawTxns = d.rawTxns || []; this.baseCapital = d.baseCapital || 100000; } } catch(e) {} this.rebuildLedger(); },
  save() { localStorage.setItem('tb_v4', JSON.stringify({ rawTxns: this.rawTxns, baseCapital: this.baseCapital })); },
  rebuildLedger() {
    this.holdings = {}; this.closedTrades = [];
    this.rawTxns.sort((a,b) => { let dA = new Date(a.date).getTime(); let dB = new Date(b.date).getTime(); if(dA !== dB) return dA - dB; if(a.type !== b.type) return a.type === 'buy' ? -1 : 1; return a.ts - b.ts; });
    this.rawTxns.forEach(t => {
      if (t.type === 'buy') {
        if (!this.holdings[t.symbol]) this.holdings[t.symbol] = { symbol: t.symbol, qty:0, totalCost:0, avgPrice:0, buys:[] };
        let h = this.holdings[t.symbol]; h.totalCost += t.price * t.qty; h.qty += t.qty; h.avgPrice = h.totalCost / h.qty; h.buys.push(t);
      } else if (t.type === 'sell') {
        let h = this.holdings[t.symbol]; if (!h || h.qty <= 0) return;
        let sellQty = Math.min(h.qty, t.qty); let pnl = (t.price - h.avgPrice) * sellQty; let pct = ((t.price - h.avgPrice) / h.avgPrice) * 100;
        let firstBuy = h.buys[0] || t; 
        let isIntraday = false; let holdDays = 0;
        if(t.date === firstBuy.date) { isIntraday = true; holdDays = 0; } else { holdDays = Math.max(1, Math.ceil((new Date(t.date) - new Date(firstBuy.date)) / 86400000)); }
        let tradeValue = h.avgPrice * sellQty; 
        h.qty -= sellQty; h.totalCost -= (h.avgPrice * sellQty);
        this.closedTrades.push({ symbol: t.symbol, openDate: firstBuy.date, closedDate: t.date, tradeValue: tradeValue, totalPnl: pnl, pct: pct, isPartial: h.qty > 0, holdDays, isIntraday, tag: firstBuy.tag || 'Other', conviction: firstBuy.conviction || 3, refTs: t.ts });
        if (h.qty <= 0) delete this.holdings[t.symbol];
      }
    });
  },
  addTxn(type, sym, price, qty, date, notes, tag, conviction, customTs) { this.rawTxns.push({ ts: customTs || Date.now(), type, symbol: sym.toUpperCase(), price: parseFloat(price), qty: parseInt(qty), date, notes, tag, conviction }); this.rebuildLedger(); this.save(); },
  editTxn(ts, newData) { let idx = this.rawTxns.findIndex(t => t.ts === parseInt(ts)); if (idx !== -1) { this.rawTxns[idx] = { ...this.rawTxns[idx], ...newData, price: parseFloat(newData.price), qty: parseInt(newData.qty) }; this.rebuildLedger(); this.save(); } },
  deleteTxn(ts) { this.rawTxns = this.rawTxns.filter(t => t.ts !== parseInt(ts)); this.rebuildLedger(); this.save(); },
  totalInvested() { return Object.values(this.holdings).reduce((a,h)=>a+h.qty*h.avgPrice,0); },
  totalRealizedPnl() { return this.closedTrades.reduce((a,t)=>a+t.totalPnl,0); }
};
Store.load();

const INR = (n, forceSign=false) => n==null||isNaN(n)?'—':`<span class="money">${forceSign&&n>=0?'+':''}${n<0?'-':''}₹${Math.abs(n).toLocaleString('en-IN', {minimumFractionDigits:2,maximumFractionDigits:2})}</span>`;
const DT = (d) => d?new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}):'—';
const pnlClass = (n) => n>0?'val-up':'val-dn'; 
function toast(msg, type='info') { const wrap = document.getElementById('toast-wrap'); const el = document.createElement('div'); el.className = `toast toast-${type}`; el.innerHTML = msg; wrap.appendChild(el); setTimeout(() => el.style.opacity = '0', 3500); setTimeout(() => el.remove(), 4000); }

let isGhostMode = false;
function toggleGhostMode() { isGhostMode = !isGhostMode; document.body.classList.toggle('ghost-mode', isGhostMode); document.getElementById('ghost-toggle').innerHTML = isGhostMode ? '🙈' : '👁️'; toast(isGhostMode ? 'Stealth Mode Activated' : 'Stealth Mode Disabled', 'info'); }

const themes = ['aurora', 'hologram', 'light'];
function toggleTheme() { let current = document.documentElement.getAttribute('data-theme'); let nextIndex = (themes.indexOf(current) + 1) % themes.length; let target = themes[nextIndex]; document.documentElement.setAttribute('data-theme', target); localStorage.setItem('tb_pro_theme', target); document.getElementById('theme-toggle').innerHTML = target === 'aurora' ? '🔮' : target === 'hologram' ? '🌌' : '☀️'; }
document.getElementById('theme-toggle').innerHTML = document.documentElement.getAttribute('data-theme') === 'aurora' ? '🔮' : document.documentElement.getAttribute('data-theme') === 'hologram' ? '🌌' : '☀️';

let currentPage = 'dashboard';
function navigate(page) { currentPage = page; document.querySelectorAll('.sb-nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page)); document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display = 'none'); document.getElementById(`page-${page}`).style.display = ''; renderPage(page); }
document.querySelectorAll('.sb-nav a').forEach(a => { a.addEventListener('click', () => { navigate(a.dataset.page); document.getElementById('sidebar').classList.remove('open'); }); });

function renderPage(page) {
  if(page==='dashboard') renderDashboard(); if(page==='portfolio') renderPortfolio(); if(page==='market') renderMarketMap();
  if(page==='impact') renderImpact(); if(page==='pnl') renderPnl(); if(page==='analytics') renderAnalytics(); 
  if(page==='trades') renderTrades(); if(page==='settings') renderSettings();
  document.getElementById('sb-stats').textContent = `${Object.keys(Store.holdings).length} POSITIONS`;
}

// ⚡ LIGHTNING FAST DIRECT TICKER SEARCH
let searchTimer = null; let buySelected = null;
document.getElementById('buy-stock-input').addEventListener('input', function() {
  const q = this.value.trim().toUpperCase(); const dd = document.getElementById('buy-stock-dd'); buySelected = null;
  if(!q) { dd.style.display='none'; return; }
  dd.innerHTML = '<div class="stock-item" style="color:var(--t3); justify-content:center;">Querying Live Market...</div>'; dd.style.display = 'block';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    try {
      // Direct fetch, bypassing proxy. High speed.
      const res = await fetch(`https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(q)}&quotesCount=6&country=India`);
      const data = await res.json();
      let results = [];
      if (data && data.quotes) {
          results = data.quotes.filter(q => q.exchange === 'NSI' || q.exchange === 'BSE' || (q.symbol && q.symbol.endsWith('.NS'))).map(q => ({ symbol: q.symbol.replace('.NS', '').replace('.BO', ''), name: q.shortname || q.longname || q.symbol, exchange: q.exchange === 'BSE' ? 'BSE' : 'NSE' }));
      }
      if (!results.some(r => r.symbol === q)) results.unshift({ symbol: q, name: 'Custom Entry', exchange: 'NSE' });
      
      dd.innerHTML = results.map(r => `
        <div class="stock-item" onclick="selectStock('${r.symbol}')">
          <div style="display:flex; align-items:center; gap:12px;">
             <div class="sym">${r.symbol}</div>
             <div style="font-size:12px; color:var(--t2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px;">${r.name}</div>
          </div>
          <div class="badge badge-buy">${r.exchange}</div>
        </div>
      `).join('');
    } catch(e) {
      // Fallback if blocked
      dd.innerHTML = `<div class="stock-item" onclick="selectStock('${q}')"><div class="sym">${q}</div><div class="badge badge-buy">FORCE ADD</div></div>`;
    }
  }, 200); // 200ms debounce
});
function selectStock(s) { buySelected = s; document.getElementById('buy-stock-input').value = s; document.getElementById('buy-stock-dd').style.display = 'none'; }

function openBuy() { buySelected=null; document.getElementById('buy-stock-input').value=''; document.getElementById('buy-price').value=''; document.getElementById('buy-qty').value=''; document.getElementById('buy-date').value=new Date().toISOString().split('T')[0]; document.getElementById('buy-modal').style.display='flex'; }
function closeBuy() { document.getElementById('buy-modal').style.display='none'; }
function submitBuy() {
  const sym = buySelected || document.getElementById('buy-stock-input').value.trim().toUpperCase();
  const pr=document.getElementById('buy-price').value, qt=document.getElementById('buy-qty').value, dt=document.getElementById('buy-date').value, nt=document.getElementById('buy-notes').value, tg=document.getElementById('buy-tag').value;
  const conviction = document.querySelector('input[name="rating"]:checked').value;
  if(!sym||!pr||!qt||!dt) return toast('Data missing','error');
  Store.addTxn('buy', sym, pr, qt, dt, nt, tg, parseInt(conviction)); toast('Trade Executed','success'); closeBuy(); renderPage(currentPage);
}
function openSell() { 
  if(Object.keys(Store.holdings).length === 0) return toast('No active positions to sell.', 'error');
  document.getElementById('sell-stock-select').innerHTML = '<option value="">-- Select --</option>'+Object.values(Store.holdings).map(h=>`<option value="${h.symbol}">${h.symbol} (${h.qty})</option>`).join(''); document.getElementById('sell-price').value=''; document.getElementById('sell-qty').value=''; document.getElementById('sell-date').value=new Date().toISOString().split('T')[0]; document.getElementById('sell-modal').style.display='flex'; 
}
function closeSell() { document.getElementById('sell-modal').style.display='none'; }
function submitSell() {
  const sym=document.getElementById('sell-stock-select').value, pr=document.getElementById('sell-price').value, qt=document.getElementById('sell-qty').value, dt=document.getElementById('sell-date').value, nt=document.getElementById('sell-notes').value;
  if(!sym||!pr||!qt||!dt) return toast('Data missing','error');
  Store.addTxn('sell', sym, pr, qt, dt, nt, null, null); toast('Position Closed','success'); closeSell(); renderPage(currentPage);
}

// 🏛️ CAPITAL IMPACT TAB

  const totalPnl = Store.totalRealizedPnl();
  const totalImpactPct = Store.baseCapital > 0 ? (totalPnl / Store.baseCapital) * 100 : 0;

           <label style="display:block; font-size:11px; font-weight:700; color:var(--t2); margin-bottom:8px; text-transform:uppercase;">Base Capital (₹)</label>
           <input type="number" id="base-cap-input" value="${Store.baseCapital}" class="form-input mono" style="font-size:20px; font-weight:800; color:var(--t1); max-width:200px;" onchange="updateBaseCap(this.value)">
         </div>
         <div style="flex:1; min-width:200px;">
           <p style="font-size:12px; color:var(--t3); line-height:1.5;">This represents your core un-leveraged cash. This engine calculates exactly how your Margin/MTF positions impact your true net worth.</p>
         </div>
      </div>
    </div>

    <div class="chart-card" style="padding: 0; display: flex; flex-direction: column;">
      <div class="chart-title" style="padding: 24px 24px 16px;">Trade ROI vs True Portfolio Impact</div>

          <thead class="sticky-th"><tr><th>Asset</th><th>Position Size</th><th>Net P&L</th><th>Trade ROI</th><th>True Impact</th></tr></thead>
          <tbody>${tableRows}</tbody>
      </table></div>
    </div>
  `;
}
window.updateBaseCap = function(val) { const num = parseFloat(val); if(!isNaN(num) && num > 0) { Store.baseCapital = num; Store.save(); renderPage('impact'); } };

// 🏆 P&L LEADERBOARD (Replaced the boring Asset Matrix)
function renderPnl() {
  const el = document.getElementById('page-pnl'); const ct = Store.closedTrades;
  if(ct.length === 0) { el.innerHTML = `<div style="text-align:center; padding: 100px 20px; color:var(--t3);">No realized P&L data yet.</div>`; return; }

  const stockMap = {}; let totalPnl = 0;
  ct.forEach(t => {
    if(!stockMap[t.symbol]) stockMap[t.symbol] = { pnl: 0, trades: 0 };
    stockMap[t.symbol].pnl += t.totalPnl; stockMap[t.symbol].trades += 1; totalPnl += t.totalPnl;
  });

  const sortedStocks = Object.keys(stockMap).map(s => ({symbol: s, ...stockMap[s]})).sort((a,b)=>b.pnl - a.pnl);
  const bestStock = sortedStocks[0]; const worstStock = sortedStocks[sortedStocks.length-1];
  
  // Calculate max absolute PNL for scale
  let maxAbsPnl = Math.max(...sortedStocks.map(s => Math.abs(s.pnl)));
  if(maxAbsPnl === 0) maxAbsPnl = 1;

  let leaderboardRows = sortedStocks.map(s => {
     let width = (Math.abs(s.pnl) / maxAbsPnl) * 100;
     let color = s.pnl >= 0 ? 'var(--grn)' : 'var(--red)';
     return `
      <div style="display:flex; align-items:center; gap:16px; margin-bottom:16px;">
         <div style="width:80px; font-weight:800; font-size:13px; color:var(--t1);">${s.symbol}</div>
         <div class="pnl-bar-wrap" style="flex:1;">
            <div class="pnl-bar-bg">
               <div class="pnl-bar-fill" style="width:${width}%; background:${color}; box-shadow: 0 0 10px ${color};"></div>
            </div>
         </div>
         <div class="mono ${pnlClass(s.pnl)}" style="width:100px; text-align:right; font-weight:800; font-size:14px;">${INR(s.pnl, true)}</div>
      </div>
     `;
  }).join('');

  const sortedCt = [...ct].sort((a,b)=> b.refTs - a.refTs);
  let tableRows = sortedCt.map(t => {
    return `<tr><td><div style="font-weight:800; color:var(--t1);">${t.symbol}</div></td><td class="mono" style="font-size:12px; color:var(--t2);">${DT(t.openDate)} <br> ${DT(t.closedDate)}</td><td class="mono ${pnlClass(t.totalPnl)}" style="font-weight:800">${INR(t.totalPnl, true)}</td><td class="mono ${pnlClass(t.pct)}">${t.pct >= 0 ? '+' : ''}${t.pct.toFixed(2)}%</td></tr>`;
  }).join('');

  el.innerHTML = `
    <div style="margin-bottom: 24px;"><h2 style="font-size: 32px; font-weight: 800;">Profit & Loss Book</h2></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-lbl" style="color:var(--acc)">Net Realized P&L</div><div class="stat-val ${pnlClass(totalPnl)}">${INR(totalPnl, true)}</div></div>
      <div class="stat-card" style="border-color:rgba(16,185,129,0.3)"><div class="stat-lbl" style="color:var(--grn)">Cash Cow</div><div class="stat-val val-up">${bestStock && bestStock.pnl > 0 ? bestStock.symbol : '--'}</div><div class="stat-sub">${bestStock && bestStock.pnl > 0 ? INR(bestStock.pnl, true) : '--'}</div></div>
      <div class="stat-card" style="border-color:rgba(244,63,94,0.3)"><div class="stat-lbl" style="color:var(--red)">Capital Bleeder</div><div class="stat-val val-dn">${worstStock && worstStock.pnl < 0 ? worstStock.symbol : 'None'}</div><div class="stat-sub">${worstStock && worstStock.pnl < 0 ? INR(worstStock.pnl, true) : '--'}</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card" style="padding: 24px; display: flex; flex-direction: column;">
        <div class="chart-title">🏆 P&L Asset Leaderboard</div>
        <div style="flex:1; max-height:400px; overflow-y:auto; padding-right:10px;">${leaderboardRows}</div>
      </div>
      <div class="chart-card" style="padding: 0; display: flex; flex-direction: column;">
        <div class="chart-title" style="padding: 24px 24px 16px;">Detailed Ledger</div>
        <div class="tbl-wrap" style="border:none; box-shadow:none; flex:1; max-height:400px; overflow-y:auto;"><table>
            <thead class="sticky-th"><tr><th>Asset</th><th>Entry/Exit</th><th>Net P&L</th><th>Return %</th></tr></thead>
            <tbody>${tableRows}</tbody>
        </table></div>
      </div>
    </div>
  `;
}

// 📊 SUPER TRADER ANALYTICS (India Focus)
function renderAnalytics() { 
  const el = document.getElementById('page-analytics'); const ct = Store.closedTrades;
  if(ct.length === 0) { el.innerHTML = `<div style="text-align:center; padding: 100px 20px; color:var(--t3);">Awaiting trades for analysis.</div>`; return; }

  const wins = ct.filter(t => t.totalPnl > 0); const losses = ct.filter(t => t.totalPnl <= 0);
  const grossWin = wins.reduce((a,t) => a + t.totalPnl, 0); const grossLoss = Math.abs(losses.reduce((a,t) => a + t.totalPnl, 0));
  const avgWin = wins.length ? grossWin / wins.length : 0; const avgLoss = losses.length ? grossLoss / losses.length : 0;
  const winRate = wins.length / ct.length;
  
  // Risk Reward
  let riskReward = avgLoss === 0 ? avgWin : (avgWin / avgLoss);
  
  // Estimated Brokerage (Zerodha/Dhan avg ₹50 round trip + STT)
  const estBrokerage = ct.length * 50; 
  
  let peakRealized = 0; let cum = 0;
  const sortedCt = [...ct].sort((a,b)=>new Date(a.closedDate)-new Date(b.closedDate));
  sortedCt.forEach(t => { cum += t.totalPnl; if(cum > peakRealized) peakRealized = cum; });
  let maxDrawdown = peakRealized - cum;

  el.innerHTML = `
    <div style="margin-bottom: 24px;"><h2 style="font-size: 32px; font-weight: 800;">Trader Analytics</h2></div>
    <div class="stats-grid">
      <div class="stat-card" style="border-color:var(--acc);"><div class="stat-lbl" style="color:var(--acc)">Risk : Reward (Avg)</div><div class="stat-val val-acc">1 : ${riskReward.toFixed(2)}</div><div class="stat-sub">For every ₹1 lost, you make ₹${riskReward.toFixed(2)}</div></div>
      <div class="stat-card"><div class="stat-lbl" style="color:var(--grn)">Win Accuracy</div><div class="stat-val val-up">${(winRate*100).toFixed(1)}%</div><div class="stat-sub">${wins.length} Wins / ${losses.length} Losses</div></div>
      <div class="stat-card" style="border-color:var(--red-d);"><div class="stat-lbl" style="color:var(--red)">Est. Brokerage & Taxes</div><div class="stat-val val-dn">~ ${INR(estBrokerage)}</div><div class="stat-sub">Assuming ₹50/trade round-trip</div></div>
      <div class="stat-card"><div class="stat-lbl" style="color:var(--yel)">System Drawdown</div><div class="stat-val val-dn">${INR(maxDrawdown)}</div><div class="stat-sub">Drop from All-Time High</div></div>
    </div>
  `;
}

// ▤ MARKET MAP (BREADTH + FAILSAFE)
async function renderMarketMap() {
  const el = document.getElementById('page-market');
  el.innerHTML = `
    <div class="market-controls">
      <button class="market-btn active" onclick="loadMapData('nifty')">NIFTY 50</button>
      <button class="market-btn" onclick="loadMapData('portfolio')">MY PORTFOLIO</button>
      <div id="map-status" style="margin-left:auto; font-size:12px; color:var(--acc); font-family:var(--mono); align-self:center;"></div>
    </div>
    <div id="map-grid" class="market-grid"></div>
  `;
  loadMapData('nifty');
}
function getHeatColor(change) {
  if (change > 2) return { bg: 'rgba(16,185,129,0.6)', border: 'rgba(16,185,129,1)' };
  if (change > 0) return { bg: 'rgba(16,185,129,0.2)', border: 'rgba(16,185,129,0.4)' };
  if (change > -2) return { bg: 'rgba(244,63,94,0.2)', border: 'rgba(244,63,94,0.4)' };
  return { bg: 'rgba(244,63,94,0.6)', border: 'rgba(244,63,94,1)' };
}
async function loadMapData(type) {
  const grid = document.getElementById('map-grid'); const stat = document.getElementById('map-status'); if(!grid) return;
  let symbols = type === 'nifty' ? NIFTY_50 : Object.keys(Store.holdings);
  if(symbols.length === 0) { grid.innerHTML = `<div style="color:var(--t3); grid-column:1/-1;">No active positions.</div>`; stat.innerText = ''; return; }
  
  grid.innerHTML = symbols.map(s => `<div class="market-card" id="mc-${s}"><div class="mc-sym">${s}</div><div class="mc-price">...</div><div class="mc-pct">...</div></div>`).join('');
  stat.innerText = 'FETCHING...';

  try {
    const qs = symbols.map(s => s+'.NS').join(',');
    const url = encodeURIComponent(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${qs}`);
    let res = await fetch(`https://api.allorigins.win/raw?url=${url}`);
    let data = await res.json();
    data.quoteResponse.result.forEach(q => {
      const s = q.symbol.replace('.NS', ''); const p = q.regularMarketPrice; const c = q.regularMarketChangePercent; const card = document.getElementById(`mc-${s}`);
      if(card) { const col = getHeatColor(c); card.style.background = col.bg; card.style.borderColor = col.border; card.querySelector('.mc-price').innerHTML = `₹${p.toFixed(2)}`; card.querySelector('.mc-pct').innerHTML = `${c>=0?'+':''}${c.toFixed(2)}%`; card.querySelector('.mc-pct').style.color = '#fff'; }
    }); stat.innerText = 'LIVE 📡';
  } catch(e) {
    // FAILSAFE: If proxy blocked, simulate data so UI doesn't look dead.
    stat.innerText = 'PROXY BLOCKED (SIMULATING)';
    symbols.forEach(s => {
      const card = document.getElementById(`mc-${s}`);
      if(card) {
        let p = 1000 + (Math.random()*2000); let c = (Math.random()*6) - 3;
        const col = getHeatColor(c); card.style.background = col.bg; card.style.borderColor = col.border; card.querySelector('.mc-price').innerHTML = `₹${p.toFixed(2)}`; card.querySelector('.mc-pct').innerHTML = `${c>=0?'+':''}${c.toFixed(2)}%`; card.querySelector('.mc-pct').style.color = '#fff';
      }
    });
  }
}

async function renderDashboard() {
  const el = document.getElementById('page-dashboard'), holdings = Object.values(Store.holdings), ct = Store.closedTrades;
  const realPnl = Store.totalRealizedPnl(), invested = Store.totalInvested(), wins = ct.filter(t=>t.totalPnl>0).length, winRate = ct.length>0?(wins/ct.length*100):0;
  
  el.innerHTML = `
    <div style="margin-bottom: 32px; display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px;">
      <div><h2 style="font-size: 38px; font-weight: 800; letter-spacing: -1.5px;">Dashboard</h2></div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-lbl" style="color:var(--acc)">Active Capital</div><div class="stat-val val-acc" id="dash-inv">${INR(invested)}</div></div>
      <div class="stat-card"><div class="stat-lbl" style="color:${realPnl>=0?'var(--grn)':'var(--red)'}">Realized Yield</div><div class="stat-val ${pnlClass(realPnl)}" id="dash-real">${INR(realPnl,true)}</div></div>
      <div class="stat-card"><div class="stat-lbl" style="color:var(--grn)">Win Rate</div><div class="stat-val">${winRate.toFixed(1)}%</div></div>
    </div>
    <div class="chart-grid"><div class="chart-card" style="grid-column: span 2;"><div class="chart-title">Equity Curve</div><div style="height:250px;position:relative"><canvas id="equity-chart"></canvas></div></div></div>
  `;
  drawEquityChart();
}
function drawEquityChart() {
  const ctx = document.getElementById('equity-chart'); if(!ctx) return; if(equityChart) equityChart.destroy();
  const sorted = [...Store.closedTrades].sort((a,b)=>new Date(a.closedDate)-new Date(b.closedDate)); let cum=0; const labels=[], data=[];
  sorted.forEach(t=>{ cum+=t.totalPnl; labels.push(DT(t.closedDate)); data.push(+cum.toFixed(2)); });
  if(!data.length){ ctx.parentElement.innerHTML = '<div style="height:250px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-weight:600;">System requires data to project curve.</div>'; return; }
  let gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 250); gradient.addColorStop(0, cum>=0?'rgba(16,185,129,0.5)':'rgba(244,63,94,0.5)'); gradient.addColorStop(1, 'rgba(0,0,0,0)');
  const col = cum>=0?'#10b981':'#f43f5e'; Chart.defaults.color = '#86868b'; Chart.defaults.font.family = 'Plus Jakarta Sans';
  equityChart = new Chart(ctx, { type:'line', data:{labels,datasets:[{data,borderColor:col,backgroundColor:gradient,fill:true,tension:0.4,borderWidth:3,pointRadius:0,pointHoverRadius:6}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}, interaction:{mode:'index',intersect:false}, scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(128,128,128,0.1)'}, border:{display:false}}}} });
}

function renderTrades() {
  const el = document.getElementById('page-trades'); const sortedRaw = [...Store.rawTxns].sort((a,b)=>b.ts-a.ts);
  el.innerHTML = `
    <div class="tbl-wrap"><table><thead class="sticky-th"><tr><th>Action</th><th>Asset</th><th>Date</th><th>Price</th><th>Volume</th><th>Manage</th></tr></thead>
    <tbody>${sortedRaw.map(t=>{
      return `<tr><td><span class="badge ${t.type==='buy'?'badge-buy':'badge-sell'}">${t.type}</span></td><td><div style="font-weight:800;">${t.symbol}</div></td><td class="mono">${DT(t.date)}</td><td class="mono">${INR(t.price)}</td><td class="mono">${t.qty}</td><td><button class="btn btn-ghost btn-sm" onclick="openEdit(${t.ts})">⚙️ Edit</button></td></tr>`;
    }).join('')}</tbody></table></div>`;
}
function renderSettings() { document.getElementById('page-settings').innerHTML = `<div class="stats-grid"><div class="stat-card"><div class="stat-lbl" style="color:var(--red)">System Purge</div><button class="btn btn-danger" style="width:100%; margin-top:16px;" onclick="clearAllData()">Format Drive</button></div></div>`; }
function clearAllData() { if(confirm("Are you sure?")) { localStorage.removeItem('tb_v4'); Store.rawTxns = []; Store.rebuildLedger(); toast('System Wiped.', 'info'); renderSettings(); } }

navigate('dashboard');
</script>
