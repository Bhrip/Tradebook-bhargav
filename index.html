<!DOCTYPE html>
<html lang="en" data-theme="aurora">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>TradeBook — Pro Equity Tracker</title>

<meta name="theme-color" content="#050510">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

/* THEME 1: AURORA GLASS (Dark Mode) */
:root[data-theme="aurora"] {
  --bg: #09090b; --bg-grad: #11111a;
  --s1: rgba(24, 24, 27, 0.6); --s2: rgba(39, 39, 42, 0.6); 
  --b1: rgba(255, 255, 255, 0.08); --b2: rgba(255, 255, 255, 0.15); 
  --t1: #fafafa; --t2: #a1a1aa; --t3: #71717a;
  --acc: #3b82f6; --acc-glow: rgba(59,130,246,0.3);
  --grn: #10b981; --grn-glow: rgba(16,185,129,0.2);
  --red: #ef4444; --red-glow: rgba(239,68,68,0.2);
  --yel: #f59e0b; --purp: #a855f7;
  --orb-1: #1d4ed8; --orb-2: #6b21a8; --orb-3: #047857;
  --r: 20px; --r-sm: 12px; --glass-blur: blur(20px);
  --shadow-base: 0 10px 30px -10px rgba(0,0,0,0.5);
  --overlay-bg: rgba(0,0,0,0.8);
}

/* THEME 2: LIQUID HOLOGRAM (Sci-Fi Mode) */
:root[data-theme="hologram"] {
  --bg: #050510; --bg-grad: #1a1a3a;
  --s1: rgba(20, 20, 45, 0.4); --s2: rgba(30, 30, 70, 0.6); 
  --b1: rgba(168, 85, 247, 0.2); --b2: rgba(0, 240, 255, 0.3); 
  --t1: #ffffff; --t2: #a5b4fc; --t3: #6366f1;
  --acc: #00f0ff; --acc-glow: rgba(0, 240, 255, 0.5);
  --grn: #10b981; --grn-glow: rgba(16, 185, 129, 0.4);
  --red: #f43f5e; --red-glow: rgba(244, 63, 94, 0.4);
  --yel: #facc15; --purp: #a855f7;
  --orb-1: #a855f7; --orb-2: #00f0ff; --orb-3: #3b82f6;
  --r: 24px; --r-sm: 16px; --glass-blur: blur(30px);
  --shadow-base: 0 10px 40px -10px rgba(168, 85, 247, 0.2);
  --overlay-bg: rgba(5,5,15,0.8);
}

/* THEME 3: ZENITH (Light Mode) */
:root[data-theme="light"] {
  --bg: #F3F4F6; --bg-grad: #FFFFFF;
  --s1: rgba(255, 255, 255, 0.7); --s2: rgba(255, 255, 255, 0.9); 
  --b1: rgba(0, 0, 0, 0.08); --b2: rgba(0, 0, 0, 0.15); 
  --t1: #111827; --t2: #4B5563; --t3: #9CA3AF;
  --acc: #2563EB; --acc-glow: rgba(37, 99, 235, 0.2);
  --grn: #059669; --grn-glow: rgba(5, 150, 105, 0.2);
  --red: #DC2626; --red-glow: rgba(220, 38, 38, 0.2);
  --yel: #D97706; --purp: #7C3AED;
  --orb-1: #93C5FD; --orb-2: #C4B5FD; --orb-3: #6EE7B7;
  --r: 20px; --r-sm: 12px; --glass-blur: blur(20px);
  --shadow-base: 0 10px 30px -10px rgba(0,0,0,0.1);
  --overlay-bg: rgba(255,255,255,0.8);
}

/* GHOST MODE */
.ghost-mode .money { filter: blur(8px); opacity: 0.6; pointer-events: none; user-select: none; }
.money { transition: filter 0.3s ease, opacity 0.3s ease; display: inline-block; }

html, body { background-color: var(--bg); color: var(--t1); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow-x: hidden; transition: background-color 0.5s ease, color 0.5s ease; background-image: radial-gradient(circle at 50% 0%, var(--bg-grad) 0%, var(--bg) 60%); }
.mono { font-family: 'JetBrains Mono', monospace; }

.bg-mesh { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
.orb { position: absolute; border-radius: 50%; filter: blur(130px); opacity: 0.35; animation: floatOrb 20s infinite alternate ease-in-out; transition: background 1s ease; }
.orb-1 { width: 500px; height: 500px; background: var(--orb-1); top: -10%; left: -10%; }
.orb-2 { width: 600px; height: 600px; background: var(--orb-2); bottom: -20%; right: -10%; animation-delay: -5s; }
.orb-3 { width: 400px; height: 400px; background: var(--orb-3); top: 40%; left: 40%; opacity: 0.2; animation-delay: -10s; }
@keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.1); } }

input, select, button { font-family: inherit; outline: none; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 10px; }

/* Layout */
.layout { display: flex; min-height: 100vh; position: relative; z-index: 10; max-width: 100vw; overflow-x: hidden; }
.sidebar { width: 260px; flex-shrink: 0; background: var(--s1); border-right: 1px solid var(--b1); backdrop-filter: var(--glass-blur); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 20; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
.main { margin-left: 260px; flex: 1; display: flex; flex-direction: column; max-width: 100vw; overflow-x: hidden; }

/* Sidebar Nav */
.sb-logo { padding: 32px 24px 24px; border-bottom: 1px solid var(--b1); }
#user-name { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; padding: 4px 6px; margin-left: -6px; border-radius: 8px; cursor: pointer; color: var(--t1); transition: all 0.3s; }
#user-name:hover, #user-name:focus { color: var(--acc); text-shadow: 0 0 20px var(--acc-glow); }
.sb-logo-sub { font-size: 11px; color: var(--acc); margin-top: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; }

.sb-nav { padding: 20px 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.sb-nav a { display: flex; align-items: center; gap: 14px; padding: 12px 16px; font-size: 14px; font-weight: 600; color: var(--t2); border-radius: 16px; transition: all 0.3s ease; cursor: pointer; }
.sb-nav a:hover { color: var(--t1); background: rgba(128,128,128,0.1); transform: translateX(6px); }
.sb-nav a.active { color: var(--acc); background: rgba(128,128,128,0.1); border: 1px solid var(--b2); box-shadow: inset 0 0 20px rgba(128,128,128,0.05); }
.sb-footer { padding: 24px; border-top: 1px solid var(--b1); text-align: center; }
.signature { font-family: 'Caveat', cursive; font-size: 28px; font-weight: 700; color: var(--purp); margin-bottom: 6px; transform: rotate(-3deg); display: inline-block; }

.topbar { margin: 24px 32px 0; padding: 16px 24px; border-radius: var(--r); border: 1px solid var(--b1); background: var(--s1); backdrop-filter: var(--glass-blur); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 24px; z-index: 15; box-shadow: var(--shadow-base); transition: all 0.4s; }

/* Buttons */
.btn { padding: 12px 24px; border-radius: var(--r-sm); font-size: 13px; font-weight: 700; border: 1px solid transparent; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease; cursor: pointer; color:#fff; position: relative; overflow: hidden; }
.btn:active { transform: scale(0.94); } 

[data-theme="aurora"] .btn-primary { background: linear-gradient(135deg, #3b82f6, #8b5cf6); box-shadow: 0 4px 15px rgba(59,130,246,0.3); }
[data-theme="aurora"] .btn-success { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
[data-theme="aurora"] .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 15px rgba(239,68,68,0.3); }

[data-theme="light"] .btn-primary { background: linear-gradient(135deg, #2563EB, #7C3AED); box-shadow: 0 4px 15px rgba(37,99,235,0.3); }
[data-theme="light"] .btn-success { background: linear-gradient(135deg, #059669, #10B981); box-shadow: 0 4px 15px rgba(5,150,105,0.3); }
[data-theme="light"] .btn-danger { background: linear-gradient(135deg, #DC2626, #EF4444); box-shadow: 0 4px 15px rgba(220,38,38,0.3); }

[data-theme="hologram"] .btn-primary { background: linear-gradient(270deg, var(--acc), var(--purp), var(--acc)); background-size: 200% 200%; animation: liquidShift 3s ease infinite; box-shadow: 0 8px 25px rgba(168,85,247,0.4); }
[data-theme="hologram"] .btn-success { background: linear-gradient(270deg, var(--grn), #059669, var(--grn)); background-size: 200% 200%; animation: liquidShift 3s ease infinite; box-shadow: 0 8px 25px var(--grn-glow); }
[data-theme="hologram"] .btn-danger { background: linear-gradient(270deg, var(--red), #e11d48, var(--red)); background-size: 200% 200%; animation: liquidShift 3s ease infinite; box-shadow: 0 8px 25px var(--red-glow); }

@keyframes liquidShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

.btn-ghost { background: var(--s1); color: var(--t1); border: 1px solid var(--b1); }
.btn-ghost:hover { background: var(--s2); border-color: var(--t2); }
.btn-sm { padding: 10px 16px; font-size: 12px; }
.btn-ico { padding: 10px; border-radius: 50%; width: 40px; height: 40px; }

/* Dashboard Cards */
.page-body { padding: 40px 32px; max-width: 1400px; margin: 0 auto; width: 100%; animation: fadeIn 0.5s ease forwards; overflow-x: hidden; }

[data-theme="aurora"] .stats-grid, [data-theme="light"] .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px; }
[data-theme="hologram"] .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 40px; perspective: 1000px; }

.stat-card { 
  background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r); 
  padding: 28px; position: relative; box-shadow: var(--shadow-base); backdrop-filter: var(--glass-blur); 
  transition: all 0.4s ease; transform-style: preserve-3d;
}
[data-theme="aurora"] .stat-card:hover, [data-theme="light"] .stat-card:hover { transform: translateY(-5px); border-color: var(--b2); }
[data-theme="hologram"] .stat-card:hover { transform: translateY(-8px) rotateX(4deg) rotateY(-2deg); border-color: var(--purp); box-shadow: 0 20px 50px -10px rgba(168,85,247,0.4); }

.stat-lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--t2); }
.stat-val { font-size: 34px; font-weight: 800; margin-top: 12px; letter-spacing: -1px; }
[data-theme="hologram"] .stat-val { transform: translateZ(20px); }
.stat-sub { font-size: 13px; color: var(--t3); margin-top: 8px; font-weight: 500; }
.val-up { color: var(--grn); text-shadow: 0 0 15px var(--grn-glow); }
.val-dn { color: var(--red); text-shadow: 0 0 15px var(--red-glow); }
.val-acc { color: var(--acc); text-shadow: 0 0 15px var(--acc-glow); }

.oracle-box { background: var(--s2); border: 1px solid var(--b1); border-radius: var(--r); padding: 24px 32px; margin-bottom: 32px; box-shadow: var(--shadow-base); backdrop-filter: blur(20px); display: flex; gap: 24px; align-items: center; transition: all 0.4s; }
.oracle-icon { font-size: 32px; animation: floatOrb 3s infinite alternate ease-in-out; filter: drop-shadow(0 0 10px var(--acc)); }
.oracle-text { font-size: 15px; font-weight: 600; color: var(--t1); line-height: 1.6; letter-spacing: 0.02em; }

.tbl-wrap { overflow-x: auto; border-radius: var(--r); border: 1px solid var(--b1); background: var(--s1); backdrop-filter: var(--glass-blur); box-shadow: var(--shadow-base); }
table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; }
thead { background: rgba(128,128,128,0.1); }
th { padding: 20px 24px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); border-bottom: 1px solid var(--b1); }
td { padding: 20px 24px; border-bottom: 1px solid var(--b1); vertical-align: middle; transition: background 0.2s; }
tbody tr { transition: transform 0.2s, background 0.2s; }
tbody tr:hover { background: rgba(128,128,128,0.05); transform: scale(1.002); }
tbody tr.clickable-row { cursor: pointer; }
tbody tr:last-child td { border-bottom: none; }
.mono { font-family: var(--mono); font-weight: 500; font-size:15px; }

.badge { display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; box-shadow: inset 0 0 10px rgba(255,255,255,0.05); }
.badge-buy { background: rgba(16,185,129,0.15); color: var(--grn); border: 1px solid rgba(16,185,129,0.4); }
.badge-sell { background: rgba(244,63,94,0.15); color: var(--red); border: 1px solid rgba(244,63,94,0.4); }
.badge-tag { background: rgba(168,85,247,0.1); color: var(--purp); border: 1px solid rgba(168,85,247,0.3); margin-top: 6px; font-size: 9px; }
.badge-open { background: rgba(255,159,10,0.15); color: var(--yel); border: 1px solid rgba(255,159,10,0.4); }

/* Modals */
.overlay { position: fixed; inset: 0; background: var(--overlay-bg); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(15px); animation: fadeIn 0.3s ease; }
.modal { background: var(--bg); border: 1px solid var(--b1); border-radius: 32px; padding: 40px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 30px 80px rgba(0,0,0,0.8); }
.modal-close { position: absolute; top: 24px; right: 24px; background: rgba(128,128,128,0.1); border: 1px solid var(--b1); color: var(--t2); width: 40px; height: 40px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; cursor:pointer;}
.modal-close:hover { background: var(--red); color: #fff; transform: rotate(90deg); border-color: var(--red); }
.modal-title { font-size: 26px; font-weight: 800; margin-bottom: 32px; letter-spacing: -0.5px; }

.form-group { margin-bottom: 24px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--t2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
.form-input { width: 100%; background: rgba(128,128,128,0.1); border: 1px solid var(--b1); border-radius: 16px; padding: 16px 20px; color: var(--t1); font-size: 15px; transition: all 0.3s ease; }
.form-input:focus { border-color: var(--purp); box-shadow: 0 0 0 3px rgba(168,85,247,0.2); background: rgba(128,128,128,0.15); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

.star-rating { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 6px; }
.star-rating input { display: none; }
.star-rating label { font-size: 28px; color: rgba(128,128,128,0.3); cursor: pointer; transition: all 0.3s; }
.star-rating input:checked ~ label, .star-rating label:hover, .star-rating label:hover ~ label { color: var(--yel); text-shadow: 0 0 15px rgba(250,204,21,0.6); transform: scale(1.1); }

/* PERFECTED RESTORED DROPDOWN */
.stock-search-wrap { position: relative; }
.stock-dd { position: absolute; top: calc(100% + 12px); left: 0; right: 0; background: var(--bg); border: 1px solid var(--b1); border-radius: 16px; z-index: 200; max-height: 300px; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.5); backdrop-filter: blur(30px); }
.stock-item { padding: 16px 24px; cursor: pointer; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--b1); transition: all 0.2s; }
.stock-item:hover { background: rgba(128,128,128,0.1); padding-left: 32px; }
.stock-item .sym { font-family: var(--mono); font-size: 15px; font-weight: 800; color: var(--acc); min-width: 90px; }

.chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 40px; }
.chart-card { background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r); padding: 32px; box-shadow: var(--shadow-base); backdrop-filter: var(--glass-blur); }
.chart-title { font-size: 15px; font-weight: 700; color: var(--t1); margin-bottom: 24px; letter-spacing: 0.05em; }
.live-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--acc); animation: pulse 2s infinite; margin-right: 10px; box-shadow: 0 0 15px var(--acc); }

@keyframes pulse { 0% { transform: scale(0.95); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.5; } 100% { transform: scale(0.95); opacity: 1; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); filter: blur(10px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
.fade-in { animation: fadeIn 0.5s ease forwards; }

/* BULLETPROOF MOBILE ADAPTATIONS */
@media(max-width: 768px) {
  .layout { max-width: 100vw; overflow-x: hidden; } 
  .sidebar { transform: translateX(-100%); width: 280px; box-shadow: 30px 0 60px rgba(0,0,0,0.9); } 
  .sidebar.open { transform: none; } 
  .main { margin-left: 0; width: 100vw; max-width: 100vw; overflow-x: hidden; } 
  
  .topbar { margin: 8px 12px 0; padding: 12px 16px; border-radius: 16px; }
  .btn-sm { padding: 8px 10px; font-size: 11px; }
  .btn-ico { padding: 8px; width: 34px; height: 34px; font-size: 14px; }
  .mob-menu-btn { display: block; background: rgba(128,128,128,0.1); border: 1px solid var(--b1); color: var(--t1); font-size: 14px; font-weight:700; cursor: pointer; padding: 8px 12px; border-radius: 12px; }
  
  .page-body { padding: 20px 12px; width: 100%; max-width: 100%; overflow-x: hidden; } 
  h2 { font-size: 24px !important; }
  
  /* PERFECT 2x2 MOBILE GRID */
  .stats-grid { display: grid !important; grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 8px; margin-bottom: 24px; width: 100%; perspective: none; } 
  .stat-card { padding: 16px 12px; border-radius: 16px; transform: none !important; min-width: 0; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
  .stat-lbl { font-size: 10px; letter-spacing: 0.05em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-val { font-size: 18px; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.5px; transform:none !important;}
  .stat-sub { font-size: 10px; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  .oracle-box { flex-direction: column; align-items: flex-start; padding: 16px; border-radius: 16px; gap:12px; width: 100%; }
  .chart-grid { grid-template-columns: 1fr; gap: 16px; width: 100%; } 
  .form-row { grid-template-columns: 1fr; gap: 16px; }
}

.toast-wrap { position: fixed; bottom: 32px; right: 32px; z-index: 500; display: flex; flex-direction: column; gap: 12px; }
.toast { padding: 16px 24px; border-radius: 16px; font-size: 14px; font-weight: 600; animation: fadeIn 0.4s; display: flex; align-items: center; gap: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); backdrop-filter: blur(20px); background: var(--bg); border: 1px solid var(--b2); color: var(--t1); }

/* FLEX CARD HIDDEN RENDERER */
#flex-export { position: absolute; top: -9999px; left: -9999px; width: 450px; background: var(--bg); color: var(--t1); padding: 40px; border-radius: 24px; font-family: 'Plus Jakarta Sans', sans-serif; z-index: -10; border: 1px solid var(--b2); overflow: hidden; }
</style>
</head>
<body>

<div class="bg-mesh"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

<script>
  const savedTheme = localStorage.getItem('tb_pro_theme') || 'aurora';
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>

<div class="layout">
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div style="display:flex;align-items:flex-start;gap:12px">
      <span style="font-size:34px; line-height:1; color:var(--acc)">✦</span>
      <div>
        <div id="user-name" contenteditable="true" spellcheck="false" title="Click to edit">Bhargav AI</div>
        <div class="sb-logo-sub">Neural Network</div>
      </div>
    </div>
  </div>
  <nav class="sb-nav" id="nav">
    <a class="active" data-page="dashboard"><span class="ico">◒</span>Dashboard</a>
    <a data-page="portfolio"><span class="ico">◉</span>Holdings</a>
    <a data-page="trades"><span class="ico">◈</span>Ledger</a>
    <a data-page="analytics"><span class="ico">◎</span>Analytics</a>
    <a data-page="settings"><span class="ico">⚙</span>System</a>
  </nav>
  <div class="sb-footer">
    <div class="signature">Crafted for Bhargav</div>
    <div id="sb-stats" style="font-size: 12px; color: var(--t3); font-weight:600; margin-top:8px; letter-spacing:0.1em;">0 Positions</div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="mob-menu-btn" onclick="document.getElementById('sidebar').classList.add('open'); event.stopPropagation();">☰ Menu</button>
    <div style="display:flex;gap:10px; margin-left:auto;">
      <button class="btn btn-ghost btn-ico" id="ghost-toggle" onclick="toggleGhostMode()" title="Stealth Mode">👁️</button>

<script>
const nameEl = document.getElementById('user-name');
nameEl.textContent = localStorage.getItem('tb_username') || "Bhargav AI";
nameEl.addEventListener('blur', () => localStorage.setItem('tb_username', nameEl.textContent));
nameEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); } });

let isGhostMode = false;

const Store = {
  rawTxns: [], holdings: {}, closedTrades: [],
  load() { try { const d = JSON.parse(localStorage.getItem('tb_v4')); if(d) this.rawTxns = d.rawTxns || []; } catch(e) {} this.rebuildLedger(); },
  save() { localStorage.setItem('tb_v4', JSON.stringify({ rawTxns: this.rawTxns })); },
  rebuildLedger() {
    this.holdings = {}; this.closedTrades = [];
    this.rawTxns.sort((a,b) => { let dA = new Date(a.date).getTime(); let dB = new Date(b.date).getTime(); if(dA !== dB) return dA - dB; if(a.type !== b.type) return a.type === 'buy' ? -1 : 1; return a.ts - b.ts; });
    this.rawTxns.forEach(t => {
      if (t.type === 'buy') {
        if (!this.holdings[t.symbol]) this.holdings[t.symbol] = { qty:0, totalCost:0, avgPrice:0, buys:[] };
        let h = this.holdings[t.symbol]; h.totalCost += t.price * t.qty; h.qty += t.qty; h.avgPrice = h.totalCost / h.qty; h.buys.push(t);
      } else if (t.type === 'sell') {
        let h = this.holdings[t.symbol]; if (!h || h.qty <= 0) return;
        let sellQty = Math.min(h.qty, t.qty); let pnl = (t.price - h.avgPrice) * sellQty; let pct = ((t.price - h.avgPrice) / h.avgPrice) * 100;
        let firstBuy = h.buys[0] || t; let holdDays = Math.max(0, Math.ceil((new Date(t.date) - new Date(firstBuy.date)) / 86400000));
        h.qty -= sellQty; h.totalCost -= (h.avgPrice * sellQty);
        this.closedTrades.push({ symbol: t.symbol, openDate: firstBuy.date, closedDate: t.date, totalPnl: pnl, pct: pct, isPartial: h.qty > 0, holdDays, tag: firstBuy.tag || 'Other', conviction: firstBuy.conviction || 3, refTs: t.ts });
        if (h.qty <= 0) delete this.holdings[t.symbol];
      }
    });
  },
  addTxn(type, sym, price, qty, date, notes, tag, conviction, customTs) { this.rawTxns.push({ ts: customTs || Date.now(), type, symbol: sym.toUpperCase(), price: parseFloat(price), qty: parseInt(qty), date, notes, tag, conviction }); this.rebuildLedger(); this.save(); },
  editTxn(ts, newData) { let idx = this.rawTxns.findIndex(t => t.ts === parseInt(ts)); if (idx !== -1) { this.rawTxns[idx] = { ...this.rawTxns[idx], ...newData, price: parseFloat(newData.price), qty: parseInt(newData.qty) }; this.rebuildLedger(); this.save(); } },
  deleteTxn(ts) { this.rawTxns = this.rawTxns.filter(t => t.ts !== parseInt(ts)); this.rebuildLedger(); this.save(); },
  totalInvested() { return Object.values(this.holdings).reduce((a,h)=>a+h.qty*h.avgPrice,0); },
  totalRealizedPnl() { return this.closedTrades.reduce((a,t)=>a+t.totalPnl,0); }
};
Store.load();

let searchTimer = null;
async function searchNSE(query) { 
  const q = query.toUpperCase().trim(); if (!q) return []; 
  try { 
    const url = encodeURIComponent(`https://query2.finance.yahoo.com/v1/finance/search?q=${q}&quotesCount=15&country=India`);
    let res = await fetch(`https://corsproxy.io/?${url}`).catch(() => fetch(`https://api.allorigins.win/raw?url=${url}`));
    const data = await res.json(); 
    if (data && data.quotes) return data.quotes.filter(q => q.exchange === 'NSI' || q.exchange === 'BSE' || (q.symbol && q.symbol.endsWith('.NS'))).map(q => ({ symbol: q.symbol.replace('.NS', '').replace('.BO', ''), name: q.shortname || q.longname || q.symbol, exchange: q.exchange === 'BSE' ? 'BSE' : 'NSE' })); 
  } catch (e) {} return []; 
}

const PRICE_CACHE = {}, PRICE_PENDING = {};
async function fetchPrice(symbol) { 
  const yahooSym = symbol + '.NS'; if (PRICE_CACHE[symbol] && (Date.now() - PRICE_CACHE[symbol].ts) < 60000) return PRICE_CACHE[symbol].price; if (PRICE_PENDING[symbol]) return null; PRICE_PENDING[symbol] = true; 
  try { 
    const url = encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${yahooSym}?interval=1d&range=1d`);
    const res = await fetch(`https://corsproxy.io/?${url}`).catch(() => fetch(`https://api.allorigins.win/raw?url=${url}`));
    const price = (await res.json())?.chart?.result?.[0]?.meta?.regularMarketPrice; 
    if (price) { PRICE_CACHE[symbol] = { price, ts: Date.now() }; delete PRICE_PENDING[symbol]; return price; } 
  } catch(e) {} delete PRICE_PENDING[symbol]; return null; 
}

const INR = (n, forceSign=false) => n==null||isNaN(n)?'—':`<span class="money">${forceSign&&n>=0?'+':''}${n<0?'-':''}₹${Math.abs(n).toLocaleString('en-IN', {minimumFractionDigits:2,maximumFractionDigits:2})}</span>`;
const DT = (d) => d?new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}):'—';
const pnlClass = (n) => n>0?'val-up':'val-dn'; 

function toast(msg, type='info') { const wrap = document.getElementById('toast-wrap'); const el = document.createElement('div'); el.className = `toast toast-${type}`; el.innerHTML = `${type==='success'?'<span style="color:var(--grn);font-size:18px">✦</span>':'<span style="color:var(--red);font-size:18px">⚠</span>'} ${msg}`; wrap.appendChild(el); setTimeout(() => el.style.opacity = '0', 3500); setTimeout(() => el.remove(), 4000); }

function toggleGhostMode() {
  isGhostMode = !isGhostMode; document.body.classList.toggle('ghost-mode', isGhostMode);
  document.getElementById('ghost-toggle').innerHTML = isGhostMode ? '🙈' : '👁️';
  toast(isGhostMode ? 'Stealth Mode Activated' : 'Stealth Mode Disabled', 'info');
}

const themes = ['aurora', 'hologram', 'light'];
function toggleTheme() { 
  let current = document.documentElement.getAttribute('data-theme');
  let nextIndex = (themes.indexOf(current) + 1) % themes.length;
  let target = themes[nextIndex];
  document.documentElement.setAttribute('data-theme', target); 
  localStorage.setItem('tb_pro_theme', target); 
  updateThemeButton();
}
function updateThemeButton() {
  const t = document.documentElement.getAttribute('data-theme');
  document.getElementById('theme-toggle').innerHTML = t === 'aurora' ? '🔮' : t === 'hologram' ? '🌌' : '☀️';
}
updateThemeButton(); 

let currentPage = 'dashboard';
function navigate(page) { currentPage = page; document.querySelectorAll('.sb-nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page)); document.querySelectorAll('[id^="page-"]').forEach(el => el.style.display = 'none'); document.getElementById(`page-${page}`).style.display = ''; renderPage(page); }
document.querySelectorAll('.sb-nav a').forEach(a => { a.addEventListener('click', () => { navigate(a.dataset.page); document.getElementById('sidebar').classList.remove('open'); }); });
document.addEventListener('click', (e) => { const sidebar = document.getElementById('sidebar'), menuBtn = document.querySelector('.mob-menu-btn'); if (window.innerWidth <= 768 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && !menuBtn.contains(e.target)) { sidebar.classList.remove('open'); } });

function renderPage(page) {
  if(page==='dashboard') renderDashboard(); if(page==='portfolio') renderPortfolio();
  if(page==='trades') renderTrades(); if(page==='analytics') renderAnalytics(); if(page==='settings') renderSettings();
  document.getElementById('sb-stats').textContent = `${Object.keys(Store.holdings).length} POSITIONS`;
}

function generateOracleInsights() {
  const ct = Store.closedTrades; if(ct.length < 3) return "Awaiting neural feedback. Populate the ledger.";
  let wins = ct.filter(t=>t.totalPnl>0); let losses = ct.filter(t=>t.totalPnl<=0);
  let winHold = wins.length ? wins.reduce((a,t)=>a+(t.holdDays||0),0)/wins.length : 0;
  let lossHold = losses.length ? losses.reduce((a,t)=>a+(t.holdDays||0),0)/losses.length : 0;
  if (lossHold > winHold * 2 && losses.length > 2) return "Tilt Detected: You hold losing assets exponentially longer than winners. Cut losers quickly.";
  if (winHold > lossHold && wins.length > losses.length) return "Elite Execution: You are letting winners run and systematically cutting losers. Pure discipline.";
  if (wins.length > 0 && losses.length > 0) { let sm = {}; ct.forEach(t=>{ if(!sm[t.tag])sm[t.tag]=0; sm[t.tag]+=t.totalPnl; }); let b = Object.keys(sm).reduce((a,b)=>sm[a]>sm[b]?a:b); return `Alpha Identified: Strategy [${b}] drives your portfolio yield. Double down.`; }
  return "System operational. Stick to your risk parameters today.";
}

async function generateFlexCard() {
  toast('Rendering Flex Card...', 'info');
  const ct = Store.closedTrades; const wins = ct.filter(t=>t.totalPnl>0).length; const winRate = ct.length>0?(wins/ct.length*100):0;
  const myName = localStorage.getItem('tb_username') || "Bhargav AI";
  
  const exportDiv = document.getElementById('flex-export');
  exportDiv.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
      <h2 style="font-size:32px; font-weight:800; letter-spacing:-1px; margin:0;">${myName}</h2>
      <div style="font-family:'Caveat', cursive; font-size:28px; color:var(--acc);">Verified Edge</div>
    </div>
    <div style="display:flex; gap:20px; margin-bottom:20px;">
      <div style="background:rgba(128,128,128,0.1); padding:20px; border-radius:16px; flex:1;">
        <div style="font-size:11px; color:var(--t2); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Win Rate</div>
        <div style="font-size:36px; font-weight:800; color:var(--grn);">${winRate.toFixed(1)}%</div>
      </div>
      <div style="background:rgba(128,128,128,0.1); padding:20px; border-radius:16px; flex:1;">
        <div style="font-size:11px; color:var(--t2); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">Trades Taken</div>
        <div style="font-size:36px; font-weight:800; color:var(--t1);">${ct.length}</div>
      </div>
    </div>
    <div style="background:rgba(128,128,128,0.1); padding:20px; border-radius:16px;">
        <div style="font-size:11px; color:var(--t2); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">AI Insight</div>
        <div style="font-size:14px; font-weight:600; line-height:1.5;">${generateOracleInsights()}</div>

  `;
  
  html2canvas(exportDiv, { backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--bg').trim(), scale: 2 }).then(canvas => {

    toast('Image saved! Flex on them.', 'success');
  });
}

let equityChart = null;
async function renderDashboard() {
  const el = document.getElementById('page-dashboard'), holdings = Object.values(Store.holdings), ct = Store.closedTrades;
  const realPnl = Store.totalRealizedPnl(), invested = Store.totalInvested(), wins = ct.filter(t=>t.totalPnl>0).length, winRate = ct.length>0?(wins/ct.length*100):0;
  const myName = localStorage.getItem('tb_username') ? localStorage.getItem('tb_username').split("'")[0] : 'Bhargav AI';

  el.innerHTML = `
    <div style="margin-bottom: 32px; display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px;">
      <div><h2 style="font-size: 38px; font-weight: 800; letter-spacing: -1.5px;">Welcome, ${myName}.</h2></div>
      <button class="btn btn-ghost" onclick="generateFlexCard()" style="border-radius:20px; box-shadow:var(--shadow-base);">📸 Share Edge</button>
    </div>
    
    <div class="oracle-box"><div class="oracle-icon">✧</div><div class="oracle-text">${generateOracleInsights()}</div></div>
    
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-lbl" style="color:var(--acc)">Active Capital</div><div class="stat-val val-acc" id="dash-inv">${INR(invested)}</div><div class="stat-sub">${holdings.length} active assets</div></div>
      <div class="stat-card"><div class="stat-lbl" style="color:${realPnl>=0?'var(--grn)':'var(--red)'}">Realized Yield</div><div class="stat-val ${realPnl>=0?'val-up':'val-dn'}" id="dash-real">${INR(realPnl,true)}</div><div class="stat-sub">${ct.length} closed trades</div></div>
      <div class="stat-card"><div class="stat-lbl" style="color:var(--grn)">Win Rate</div><div class="stat-val">${winRate.toFixed(1)}%</div><div class="stat-sub">${wins}W / ${ct.length-wins}L</div></div>
      <div class="stat-card"><div class="stat-lbl" style="color:var(--yel)">Floating P&L</div><div class="stat-val" id="dash-unreal">...</div><div class="stat-sub">Live Link</div></div>
    </div>
    <div class="chart-grid"><div class="chart-card" style="grid-column: span 2;"><div class="chart-title">Alpha Curve</div><div style="height:250px;position:relative"><canvas id="equity-chart"></canvas></div></div></div>
  `;
  drawEquityChart();
  if(holdings.length>0) {
    let totUnreal = 0;
    await Promise.allSettled(holdings.map(async h=>{ const ltp = await fetchPrice(h.symbol); if(ltp!=null) totUnreal += (ltp - h.avgPrice)*h.qty; }));
    const uEl = document.getElementById('dash-unreal'); if(uEl) { uEl.innerHTML = INR(totUnreal,true); uEl.className = `stat-val ${totUnreal>=0?'val-up':'val-dn'}`; }
  } else { document.getElementById('dash-unreal').innerHTML = '—'; }
}

function drawEquityChart() {
  const ctx = document.getElementById('equity-chart'); if(!ctx) return; if(equityChart) equityChart.destroy();
  const sorted = [...Store.closedTrades].sort((a,b)=>new Date(a.closedDate)-new Date(b.closedDate)); let cum=0; const labels=[], data=[];
  sorted.forEach(t=>{ cum+=t.totalPnl; labels.push(DT(t.closedDate)); data.push(+cum.toFixed(2)); });
  if(!data.length){ ctx.parentElement.innerHTML = '<div style="height:250px;display:flex;align-items:center;justify-content:center;color:var(--t3);font-weight:600;">System requires data to project curve.</div>'; return; }
  
  let gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 250);
  gradient.addColorStop(0, cum>=0?'rgba(16,185,129,0.5)':'rgba(244,63,94,0.5)');
  gradient.addColorStop(1, 'rgba(0,0,0,0)');
  
  const col = cum>=0?'#10b981':'#f43f5e'; Chart.defaults.color = '#86868b'; Chart.defaults.font.family = 'Plus Jakarta Sans';
  equityChart = new Chart(ctx, { type:'line', data:{labels,datasets:[{data,borderColor:col,backgroundColor:gradient,fill:true,tension:0.4,borderWidth:3,pointRadius:0,pointHoverRadius:6}]}, options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}, interaction:{mode:'index',intersect:false}, scales:{x:{grid:{display:false}},y:{grid:{color:'rgba(128,128,128,0.1)'}, border:{display:false}}}} });
}

async function renderPortfolio() {
  const el = document.getElementById('page-portfolio'), holdings = Object.values(Store.holdings);
  if(!holdings.length){ el.innerHTML = `<div style="text-align:center; padding: 100px 20px; color:var(--t3);">No active positions found.</div>`; return; }
  el.innerHTML = `<div class="tbl-wrap"><table><thead><tr><th>Asset</th><th>Volume</th><th>Avg Cost</th><th>LTP</th><th>Floating P&L</th><th>Action</th></tr></thead>
    <tbody>${holdings.map(h=>`<tr><td><div style="font-weight:800; color:var(--acc); font-size:15px">${h.symbol}</div></td><td class="mono">${h.qty}</td><td class="mono" id="ph-avg-${h.symbol}">${INR(h.avgPrice)}</td><td class="mono" id="ph-ltp-${h.symbol}">...</td><td class="mono" id="ph-pnl-${h.symbol}">...</td><td><button class="btn btn-ghost btn-sm" onclick="openAvg('${h.symbol}', ${h.qty}, ${h.avgPrice})" style="padding:4px 8px; font-size:16px;" title="Averaging Simulator">🧮</button></td></tr>`).join('')}</tbody></table></div>`;
  holdings.forEach(async h=>{
    const ltp = await fetchPrice(h.symbol);
    if(ltp!=null){
      document.getElementById(`ph-ltp-${h.symbol}`).innerHTML = `<span class="live-dot"></span>${INR(ltp)}`;
      const pnl = (ltp-h.avgPrice)*h.qty; document.getElementById(`ph-pnl-${h.symbol}`).innerHTML = INR(pnl,true); document.getElementById(`ph-pnl-${h.symbol}`).className = `mono ${pnlClass(pnl)}`;
    }
  });
}

function renderAnalytics() { 
  const el = document.getElementById('page-analytics'); const ct = Store.closedTrades;
  if(ct.length === 0) { el.innerHTML = `<div style="text-align:center; padding: 100px 20px; color:var(--t3);">Awaiting resolution of first trade.</div>`; return; }

  const wins = ct.filter(t => t.totalPnl > 0); const losses = ct.filter(t => t.totalPnl <= 0);
  const avgWin = wins.length ? wins.reduce((a,t) => a + t.totalPnl, 0) / wins.length : 0;
  const avgLoss = losses.length ? losses.reduce((a,t) => a + t.totalPnl, 0) / losses.length : 0;
  
  let peakRealized = 0; let cum = 0;
  const sortedCt = [...ct].sort((a,b)=>new Date(a.closedDate)-new Date(b.closedDate));
  sortedCt.forEach(t => { cum += t.totalPnl; if(cum > peakRealized) peakRealized = cum; });
  let currentDrawdown = peakRealized - cum;
  
  const starMap = {5:{p:0,w:0,t:0}, 4:{p:0,w:0,t:0}, 3:{p:0,w:0,t:0}, 2:{p:0,w:0,t:0}, 1:{p:0,w:0,t:0}};
  ct.forEach(t => { const s = t.conviction || 3; if(starMap[s]) { starMap[s].p += t.totalPnl; starMap[s].t += 1; if(t.totalPnl > 0) starMap[s].w += 1; } });

  el.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card" style="border-color:var(--purp)"><div class="stat-lbl" style="color:var(--purp)">Peak Profit (ATH)</div><div class="stat-val val-up">${INR(peakRealized)}</div></div>
      <div class="stat-card"><div class="stat-lbl" style="color:var(--red)">Current Drawdown</div><div class="stat-val val-dn">${INR(currentDrawdown)}</div><div class="stat-sub">From peak realized equity</div></div>
      <div class="stat-card"><div class="stat-lbl" style="color:var(--grn)">Average Win</div><div class="stat-val val-up">${INR(avgWin, true)}</div></div>
      <div class="stat-card"><div class="stat-lbl" style="color:var(--red)">Average Loss</div><div class="stat-val val-dn">${INR(avgLoss, true)}</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><div class="chart-title">Monthly Yield</div><div style="height:250px;position:relative"><canvas id="monthly-chart"></canvas></div></div>
      <div class="chart-card" style="padding: 0; display: flex; flex-direction: column;">
        <div class="chart-title" style="padding: 32px;">Conviction Analysis</div>
        <div class="tbl-wrap" style="border:none; box-shadow:none;"><table>
            <thead><tr><th>Grade</th><th>Win%</th><th>Net P&L</th></tr></thead>
            <tbody>${[5,4,3,2,1].map(s => { let data = starMap[s]; if(data.t === 0) return ''; return `<tr><td style="color:var(--yel); font-size:12px; letter-spacing:2px;">${'★'.repeat(s)}</td><td class="mono">${((data.w / data.t) * 100).toFixed(0)}%</td><td class="mono ${data.p>=0?'val-up':'val-dn'}">${INR(data.p, true)}</td></tr>`; }).join('')}</tbody>
        </table></div>
      </div>
    </div>
  `;
  drawMonthlyChart(ct);
}

function drawMonthlyChart(closedTrades) {
  const ctx = document.getElementById('monthly-chart'); if(!ctx) return; if(monthlyChart) monthlyChart.destroy();
  const monthMap = {};
  closedTrades.forEach(t => { const d = new Date(t.closedDate); const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; monthMap[k] = (monthMap[k] || 0) + t.totalPnl; });
  const sortedMonths = Object.keys(monthMap).sort();
  const labels = sortedMonths.map(m => { const [y, mo] = m.split('-'); return new Date(y, mo - 1).toLocaleString('default', { month: 'short', year: '2-digit' }); });
  const data = sortedMonths.map(m => +monthMap[m].toFixed(2));
  const colors = data.map(v => v >= 0 ? '#10b981' : '#f43f5e'); const bgColors = data.map(v => v >= 0 ? 'rgba(16,185,129,0.3)' : 'rgba(244,63,94,0.3)');
  Chart.defaults.color = '#86868b'; Chart.defaults.font.family = 'Plus Jakarta Sans';
  monthlyChart = new Chart(ctx, { type: 'bar', data: { labels, datasets: [{ data, backgroundColor: bgColors, borderColor: colors, borderWidth: 1, borderRadius: 8 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { border:{display:false}, grid: { color: 'rgba(128,128,128,0.1)' } } } } });
}

function renderSettings() {
  document.getElementById('page-settings').innerHTML = `
    <div class="stats-grid" style="grid-template-columns:1fr;max-width:600px;">
      <div class="stat-card" style="border-color:var(--purp); box-shadow: 0 0 30px rgba(168,85,247,0.1);">
        <div class="stat-lbl" style="color: var(--purp)">Dhan Parser Engine</div>
        <div class="stat-sub" style="margin:8px 0 24px">Import your Trade Book CSV to sync history.</div>
        <input type="file" id="dhan-csv-input" accept=".csv" style="display:none;" onchange="importDhanCSV(event)"/>
        <button class="btn btn-primary" style="width:100%" onclick="document.getElementById('dhan-csv-input').click()">Upload Matrix Data</button>
      </div>
      <div class="stat-card"><div class="stat-lbl" style="color:var(--red)">System Purge</div><div class="stat-sub" style="margin:8px 0 24px; color:var(--t3)">Permanently destroy all local files.</div><button class="btn btn-danger" style="width:100%" onclick="clearAllData()">Format Drive</button></div>
    </div>`;
}

const DhanMapper = { "ONE 97 COMMUNICATIONS": "PAYTM", "NYKAA": "NYKAA", "FSN E-COMMERCE VENTURES": "NYKAA", "BLS INTERNATIONAL SERVICES": "BLS", "PIRAMAL PHARMA": "PPLPHARMA", "TIME TECHNOPLAST": "TIMETECHNO", "ONESOURCE SPECIALTY PHARMA": "ONESOURCE", "SAI LIFE SCIENCES": "SAILIFE", "LAURUS LABS": "LAURUSLABS", "EDELWEISS FINANCIAL SERVICES": "EDELWEISS", "ARMAN FINANCIAL SERVICES": "ARMANFIN", "SHRIRAM FINANCE": "SHRIRAMFIN", "PRIVI SPECIALITY CHEMICALS": "PRIVISCL", "AU SMALL FINANCE BANK": "AUBANK", "ADITYA BIRLA CAPITAL": "ABCAPITAL", "BANK OF INDIA": "BANKINDIA", "AARTI PHARMA LABS": "AARTIPHARM", "TD POWER SYSTEMS": "TDPOWERSYS", "SENORES PHARMACEUTICALS": "SENORES", "IIFL FINANCE": "IIFL", "WINDLAS BIOTECH": "WINDLAS", "AXIS BANK": "AXISBANK", "ADITYA INFOTECH LIMITED": "ADITYAINFO", "HBL ENGINEERING": "HBLPOWER", "GARWARE HI-TECH FILMS": "GARHTECH", "INTERARCH BUILDING SOLUTIONS": "INTERARCH", "INTERARCH BUILDING PRODUCTS": "INTERARCH", "SARDA ENERGY & MINERALS": "SARDAEN", "GROWW": "GROWW" };
function getCleanSymbol(name) { let upper = name.toUpperCase().trim(); if(DhanMapper[upper]) return DhanMapper[upper]; return upper.replace(/ LTD\.?| LIMITED| CORP\.?| INC\.?/g, '').split(' ')[0].substring(0, 10); }

function importDhanCSV(event) {
  const file = event.target.files[0]; if(!file) return; const reader = new FileReader();
  reader.onload = function(e) {
    const lines = e.target.result.split('\n'); if (lines.length < 2) return toast('Invalid File Matrix', 'error');
    const headers = lines[0].toLowerCase().replace(/["']/g, '').split(',');
    let symIdx = headers.findIndex(h => h === 'name' || h.includes('symbol')); let typeIdx = headers.findIndex(h => h === 'buy/sell' || h.includes('trade type')); let dateIdx = headers.findIndex(h => h === 'date' || h.includes('trade date')); let timeIdx = headers.findIndex(h => h === 'time'); let qtyIdx = headers.findIndex(h => h === 'quantity/lot' || h.includes('qty')); let priceIdx = headers.findIndex(h => h === 'trade price' || h.includes('price')); let statusIdx = headers.findIndex(h => h === 'status');
    if (symIdx===-1 || typeIdx===-1 || dateIdx===-1 || qtyIdx===-1 || priceIdx===-1) return toast('Headers Corrupted', 'error');
    let rawTrades = [];
    for(let i = 1; i < lines.length; i++) {
      if(!lines[i].trim()) continue; let row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s=>s.replace(/["']/g, '').trim());
      if(row.length < priceIdx) continue; if (statusIdx !== -1 && !['traded', 'complete', 'executed'].includes(row[statusIdx].toLowerCase())) continue;
      rawTrades.push(row);
    }
    rawTrades.sort((a, b) => {
      let dA = a[dateIdx].includes('-') ? a[dateIdx] : a[dateIdx].split('/').reverse().join('-'); let dB = b[dateIdx].includes('-') ? b[dateIdx] : b[dateIdx].split('/').reverse().join('-');
      return new Date(dA + 'T' + (a[timeIdx]||'00:00:00') + 'Z').getTime() - new Date(dB + 'T' + (b[timeIdx]||'00:00:00') + 'Z').getTime();
    });
    let c = 0;
    rawTrades.forEach(row => {
      const sym = getCleanSymbol(row[symIdx]); const type = (row[typeIdx].toLowerCase().includes('b')) ? 'buy' : 'sell';
      let rawDate = row[dateIdx]; let isoDate = rawDate.includes('-') ? rawDate : rawDate.split('/').reverse().join('-');
      let tradeTs = new Date(isoDate + 'T' + (row[timeIdx]||'00:00:00')).getTime() || (Date.now() + c);
      const pr = parseFloat(row[priceIdx]); const qt = parseInt(row[qtyIdx]);
      if(!sym || isNaN(pr) || isNaN(qt)) return;
      Store.rawTxns.push({ ts: tradeTs, type, symbol: sym, price: pr, qty: qt, date: isoDate, notes: 'DHAN_SYNC', tag: 'Dhan Import', conviction: 3 }); c++;
    });
    Store.rebuildLedger(); Store.save(); event.target.value = ''; toast(`Parsed ${c} records`, 'success'); renderPage(currentPage);
  }; reader.readAsText(file);
}
function clearAllData() { if(confirm("Are you sure? This cannot be undone.")) { localStorage.removeItem('tb_v4'); Store.rawTxns = []; Store.rebuildLedger(); toast('System Wiped.', 'info'); renderSettings(); } }

let buySelected = null;
document.getElementById('buy-stock-input').addEventListener('input', function() {
  const q = this.value; const dd = document.getElementById('buy-stock-dd'); buySelected = null;
  if(!q) { dd.style.display='none'; return; }
  dd.innerHTML = '<div class="stock-item" style="color:var(--t3); justify-content:center;">Querying Live Market...</div>'; dd.style.display = 'block';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    let res = await searchNSE(q);
    const isExactMatch = res.some(r => r.symbol === q.toUpperCase());
    if (!isExactMatch) { res.unshift({ symbol: q.toUpperCase(), name: 'Custom / SME Stock', exchange: 'NSE', isCustom: true }); }
    dd.innerHTML = res.map(r => `
      <div class="stock-item ${r.isCustom ? 'custom-item' : ''}" onclick="selectStock('${r.symbol}')">
        <div class="sym">${r.symbol}</div>
        <div style="font-size:12px; color:var(--t2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px;">${r.name}</div>
        <div class="badge ${r.exchange === 'NSE' ? 'badge-buy' : 'badge-open'}" style="margin-left:auto;">${r.exchange || 'NSE'}</div>
      </div>
    `).join('');
  }, 300); 
});
function selectStock(s) { 
  buySelected = s; 
  document.getElementById('buy-stock-input').value = s; 
  document.getElementById('buy-stock-dd').style.display = 'none'; 
  fetchPrice(s).then(l => { if (l) document.getElementById('buy-price').value = l.toFixed(2); }); 
}
function openBuy() { buySelected=null; document.getElementById('buy-stock-input').value=''; document.getElementById('buy-price').value=''; document.getElementById('buy-qty').value=''; document.getElementById('buy-date').value=new Date().toISOString().split('T')[0]; document.getElementById('buy-modal').style.display='flex'; }
function closeBuy() { document.getElementById('buy-modal').style.display='none'; }
function submitBuy() {
  const sym = buySelected || document.getElementById('buy-stock-input').value.trim().toUpperCase();
  const pr=document.getElementById('buy-price').value, qt=document.getElementById('buy-qty').value, dt=document.getElementById('buy-date').value, nt=document.getElementById('buy-notes').value, tg=document.getElementById('buy-tag').value;
  const conviction = document.querySelector('input[name="rating"]:checked').value;
  if(!sym||!pr||!qt||!dt) return toast('Data missing','error');
  Store.addTxn('buy', sym, pr, qt, dt, nt, tg, parseInt(conviction)); toast('Executed','success'); closeBuy(); renderPage(currentPage);
}
function openSell() { document.getElementById('sell-stock-select').innerHTML = '<option value="">--</option>'+Object.values(Store.holdings).map(h=>`<option value="${h.symbol}">${h.symbol} (${h.qty})</option>`).join(''); document.getElementById('sell-price').value=''; document.getElementById('sell-qty').value=''; document.getElementById('sell-date').value=new Date().toISOString().split('T')[0]; document.getElementById('sell-modal').style.display='flex'; }
function closeSell() { document.getElementById('sell-modal').style.display='none'; }
function submitSell() {
  const sym=document.getElementById('sell-stock-select').value, pr=document.getElementById('sell-price').value, qt=document.getElementById('sell-qty').value, dt=document.getElementById('sell-date').value, nt=document.getElementById('sell-notes').value;
  if(!sym||!pr||!qt||!dt) return toast('Data missing','error');
  Store.addTxn('sell', sym, pr, qt, dt, nt, null, null); toast('Terminated','success'); closeSell(); renderPage(currentPage);
}
function openEdit(ts) {
  const t = Store.rawTxns.find(x => x.ts === ts); if(!t) return;
  document.getElementById('edit-ts').value = ts; document.getElementById('edit-date').value = t.date; document.getElementById('edit-type').value = `${t.type.toUpperCase()} [${t.symbol}]`; document.getElementById('edit-price').value = t.price; document.getElementById('edit-qty').value = t.qty; document.getElementById('edit-notes').value = t.notes || '';
  if(t.type === 'buy') { document.getElementById('edit-tag-wrap').style.display = 'block'; document.getElementById('edit-tag').value = t.tag || 'Other'; } else { document.getElementById('edit-tag-wrap').style.display = 'none'; }
  document.getElementById('edit-modal').style.display = 'flex';
}
function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }
function submitEdit() {
  const ts = document.getElementById('edit-ts').value;
  const newData = { date: document.getElementById('edit-date').value, price: document.getElementById('edit-price').value, qty: document.getElementById('edit-qty').value, notes: document.getElementById('edit-notes').value, tag: document.getElementById('edit-tag-wrap').style.display === 'none' ? null : document.getElementById('edit-tag').value };
  Store.editTxn(ts, newData); toast('Ledger updated', 'success'); closeEdit(); renderPage(currentPage);
}
function deleteTrade() { const ts = document.getElementById('edit-ts').value; if(confirm("Confirm overwrite?")) { Store.deleteTxn(ts); toast('Dropped', 'info'); closeEdit(); renderPage(currentPage); } }

function openAvg(sym, curQty, curPrice) {
  document.getElementById('avg-sym').value = sym; document.getElementById('avg-cur-qty').value = curQty; document.getElementById('avg-cur-price').value = curPrice;
  document.getElementById('avg-sub').textContent = `Current: ${curQty} @ ₹${curPrice.toFixed(2)}`;
  document.getElementById('avg-add-qty').value = ''; document.getElementById('avg-add-price').value = '';
  document.getElementById('avg-result-price').innerHTML = INR(0); document.getElementById('avg-result-cap').textContent = 'Requires ₹0.00 capital';
  document.getElementById('avg-modal').style.display = 'flex';
}
function closeAvg() { document.getElementById('avg-modal').style.display = 'none'; }

function updateAvgSim() {
  const addQ = parseInt(document.getElementById('avg-add-qty').value) || 0;
  const addP = parseFloat(document.getElementById('avg-add-price').value) || 0;
  const cQ = parseInt(document.getElementById('avg-cur-qty').value);
  const cP = parseFloat(document.getElementById('avg-cur-price').value);
  if(addQ > 0 && addP > 0) {
    const newAvg = ((cQ * cP) + (addQ * addP)) / (cQ + addQ);
    document.getElementById('avg-result-price').innerHTML = INR(newAvg);
    document.getElementById('avg-result-cap').innerHTML = `Requires capital of ${INR(addQ * addP)}`;
  } else {
    document.getElementById('avg-result-price').innerHTML = INR(0); document.getElementById('avg-result-cap').textContent = 'Requires ₹0.00 capital';
  }
}
['avg-add-qty', 'avg-add-price'].forEach(id => document.getElementById(id).addEventListener('input', updateAvgSim));

document.getElementById('btn-buy').addEventListener('click', openBuy); document.getElementById('btn-sell').addEventListener('click', ()=>Object.keys(Store.holdings).length?openSell():toast('No targets available','error'));
navigate('dashboard');
</script>
